<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <h1>Students</h1>
    <div class="flex tab-menu">
        <button class="toggle-btn" data-target="add-student-content">Add Student</button>
        <button class="toggle-btn" data-target="update-student-content">Update Student</button>
        <button class="toggle-btn" data-target="search-student-content">Search Student by ID</button>
        <button class="toggle-btn" data-target="add-student-content">Delete Student</button>
    </div>
    <!-- Add Student -->
    <div class="content-group flex">
        <div class="flex content-student hidden" id="add-student-content">
            <div class="form-container">
                <label for="student-name-field">Enter Student Name</label>
                <input type="text" id="student-name-field" name="student-name-field" required>
                <br>
                <button class="toggle-btn" id="add-student-btn">Add Student</button>
            </div>
        </div>
        <!-- Update Student -->
        <div class="flex content-student hidden" id="update-student-content">
            <div class="form-container">
                <label for="id-field">Enter Id</label>
                <input type="text" id="id-field" name="id-field" required>
                <br>
                <label for="student-name">Enter Student Name</label>
                <input type="text" id="student-name" name="student-name" required>
                <br>
                <button class="toggle-btn" id="update-student-btn">Update Student</button>
            </div>
        </div>
        <!-- Search Student -->
        <div class="flex content-student hidden" id="search-student-content">
            <div class="form-container">
                <label for="id-field">Enter Id</label>
                <input type="text" id="id-field" name="id-field" required>
                <br>
                <button class="toggle-btn" id="search-student-btn">Search Student</button>
            </div>
        </div>
        <!-- Delete Student -->
        <div class="flex content-student hidden2" id="delete-student-content">
            <div class="form-container">
                <label for="id-field">Enter Id</label>
                <input type="text" id="id-field" name="id-field" required>
                <br>
                <button class="toggle-btn" id="delete-student-btn">Delete Student</button>
            </div>
        </div>
    </div>

    <ul id="studentList"></ul>

    <script src="./script.js"></script>
</body>

</html>
