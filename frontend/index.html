<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <h1>Students</h1>
    <div class="flex tab-menu">
        <button class="toggle-btn active" data-target="add-student-content">Add Student</button>
        <button class="toggle-btn" data-target="update-student-content">Update Student</button>
        <button class="toggle-btn" data-target="search-student-content">Search Student by ID</button>
        <button class="toggle-btn" data-target="delete-student-content">Delete Student</button>
    </div>
    <!-- Content-Group -->
    <div class="content-group flex">
        <!-- Add Student -->
        <div class="flex content-student" id="add-student-content">
            <div class="form-container">
                <label for="add-student-name-field">Enter Student Name</label>
                <input type="text" id="add-student-name-field" name="add-student-name-field" required>
                <br>
                <button id="add-student-btn">Add Student</button>
            </div>
        </div>
        <!-- Update Student -->
        <div class="flex content-student hidden" id="update-student-content">
            <div class="form-container">
                <label for="update-id-field">Enter Id</label>
                <input type="text" id="update-id-field" name="update-id-field" required>
                <br>
                <label for="update-student-name">Enter Student Name</label>
                <input type="text" id="update-student-name" name="update-student-name" required>
                <br>
                <button id="update-student-btn">Update Student</button>
            </div>
        </div>
        <!-- Search Student -->
        <div class="flex content-student hidden" id="search-student-content">
            <div class="form-container">
                <label for="search-id-field">Enter Id</label>
                <input type="text" id="search-id-field" name="search-id-field" required>
                <br>
                <button id="search-student-btn">Search Student</button>
            </div>
        </div>
        <!-- Delete Student -->
        <div class="flex content-student hidden" id="delete-student-content">
            <div class="form-container">
                <label for="delete-id-field">Enter Id</label>
                <input type="text" id="delete-id-field" name="delete-id-field" required>
                <br>
                <button id="delete-student-btn">Delete Student</button>
            </div>
        </div>
    </div>

    <ul id="studentList"></ul>

    <script type="module" src="./frontend_script.js"></script>
</body>

</html>
